name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@dbbdc275be76ac10734476cc723d82dfe7ec6eda

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Patch gradle.properties for CI (remove local org.gradle.java.home)
        run: |
          if [ -f gradle.properties ]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties
          fi
          mkdir -p ~/.gradle
          if [ -f ~/.gradle/gradle.properties ]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' ~/.gradle/gradle.properties
          fi

      - name: Build with Gradle Wrapper
        env:
          GRADLE_OPTS: -Dorg.gradle.java.home=${{ env.JAVA_HOME }}
        run: ./gradlew --no-daemon --stacktrace -Dorg.gradle.java.home="$JAVA_HOME" build

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Patch gradle.properties for CI (remove local org.gradle.java.home)
        run: |
          if [ -f gradle.properties ]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties
          fi
          mkdir -p ~/.gradle
          if [ -f ~/.gradle/gradle.properties ]; then
            sed -i.bak '/^org\.gradle\.java\.home=/d' ~/.gradle/gradle.properties
          fi

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@dbbdc275be76ac10734476cc723d82dfe7ec6eda
        env:
          GRADLE_OPTS: -Dorg.gradle.java.home=${{ env.JAVA_HOME }}
